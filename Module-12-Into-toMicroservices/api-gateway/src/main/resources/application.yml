spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/orders/**

        #          filters:
        #            - StripPrefix=1

        - id: inventory-service
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/inventory/**

#          filters:
#            - StripPrefix=2
#            - AddRequestHeader=X-Custom-Header, Anuj

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka