spring.application.name=Module-9-Spring-AI


# Base URL - CRITICAL: Leave out /v1 so both Chat and Embeddings paths append perfectly
spring.ai.openai.base-url=https://api.aicredits.in

# API Key - Strongly recommended to use an environment variable placeholder
spring.ai.openai.api-key=${AICREDITS_API_KEY}

# Chat Configuration
spring.ai.openai.chat.options.model=openai/gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.7

# Embedding Configuration
spring.ai.openai.embedding.options.model=text-embedding-3-large

# Logging Configuration
logging.level.org.springframework.ai.chat.client=DEBUG