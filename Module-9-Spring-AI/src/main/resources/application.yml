spring:
  application:
    name: Module-9-Spring-AI

  datasource:
    url: jdbc:postgresql://localhost:5430/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  ai:
    openai:
      base-url: https://api.aicredits.in
      api-key: ${AICREDITS_API_KEY}

      chat:
        options:
          model: openai/gpt-4o-mini
          temperature: 0.7

      embedding:
        options:
          model: text-embedding-3-large
          dimensions: 1536  # <-- FIXED: Tell OpenAI to downsample from 3072 to 1536

    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 1536    # <-- Matches the embedding option above
#        index-type: hnsw
#        distance-type: cosine_distance
#        max-document-batch-size: 10000

logging:
  level:
    org.springframework.ai.chat.client: DEBUG